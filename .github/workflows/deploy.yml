name: Deploy to Cloudflare

on:
  push:
    branches: [master]

# Serialize deploys: a new run waits for an in-flight one rather than cancelling it.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Gate: don't deploy a broken build.
      - run: npm run typecheck
      - run: npm run test

      # Apply pending D1 migrations before the new Worker code goes live.
      - name: Apply D1 migrations (production)
        working-directory: apps/api
        run: npx wrangler d1 migrations apply DB --remote --env production

      - name: Deploy API Worker
        working-directory: apps/api
        run: npx wrangler deploy --env production

      # opennextjs-cloudflare deploy = next build -> OpenNext bundle -> wrangler deploy
      - name: Deploy Web Worker
        working-directory: apps/web
        run: npm run deploy
